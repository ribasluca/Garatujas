<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Entrando no Nubank</title>
    <style>
        main {
            text-align: center;
        }
        aside {
            display:inline-block
        }
        button {
             background-color: rgba(80, 19, 138, 0.781);
             color:aliceblue;
             margin-top: 1%;
             width: 150%;
            border-radius: 10px; 
            height: 75px;
        }

        form * {
            width: 100%;
            font-size: larger;
        }
        section {
            display:inline-block
        }
        body{
             margin: 0;
             padding: 0;
             font-family: Roboto, sans-serif;
        }
        form {
            text-align: center;
            width: 900px;
            margin-top: 10%;
            display: inline-block;
            padding: 5%;
        }

            background-color: rgba(92, 22, 158, 0.952);
            text-align: center;
            color: white;
            padding: 2%;

        }
        img {
            width: 70%;
        }
        input{
            border-radius: 10px;
            height: 50px;
        }

        div {
            padding: 1%;
        }
    </style>
</head>

    <main>
        <aside>
            <img src="image.png" alt="">
        </aside>
        <section>
            <form action="" method="get">
            <div>
                <label for="username">Nome de usuário</label>
                <input type="text">

            </div>

            <div>
                <label for="password">Senha</label>
                <input type="password">
           </div>
           <div>
                <label for="password">confirme sua Senha</label>
                <input type="password">
            </div>
            <div>
                <button>entrar</button>
            </div>
        </form>
        </section>
        
    </main>

</html>
